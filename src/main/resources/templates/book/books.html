<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org">

<body>
    <main role="main">
        <div class="container py-5">
            <div class="row mb-4">
                <div class="col-12 text-center">
                    <h2 class="display-5 fw-bold">Our Collection</h2>
                    <p class="text-muted">Explore our latest arrivals and bestsellers.</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-sm-6 col-md-4 col-lg-3" th:each="book : ${books}">
                    <div class="card h-100 border-0 shadow-sm transition-hover">
                        
                        <div class="p-3 bg-light">
                            <img th:src="@{'/images/books/'+${book.imageUrl}}"
                                 class="card-img-top rounded img-fluid shadow-sm" 
                                 th:alt="${book.title}"
                                 style="height: 250px; object-fit: contain;">
                        </div>

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold text-truncate" th:text="${book.title}"></h5>
                            
                            <p class="card-text text-muted small flex-grow-1" 
                               th:text="${#strings.abbreviate(book.description, 80)}">
                            </p>
                            
                            <hr class="my-2 opacity-10">
                            
                            <div class="d-flex justify-content-between align-items-center mt-auto">
                                <small class="text-secondary fw-semibold">
                                    <i class="bi bi-person"></i> 
                                    <span th:text="${book.author.firstName + ' ' + book.author.lastName}"></span>
                                </small>
                                <span class="badge bg-primary rounded-pill px-3 py-2" 
                                      th:text="${'$' + book.price}">
                                </span>
                            </div>
                        </div>
                        
                        <div class="card-footer bg-transparent border-0 pb-3">
                            <a th:href="@{'/book/details?id='+${book.id}}" class="btn btn-outline-primary btn-sm w-100">View Details</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
