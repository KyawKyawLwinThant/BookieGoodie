<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<section th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" th:href="@{/}">
                <span class="me-2">📚</span>
                <span>Indigo<span class="text-info">Books</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/books}">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/bestsellers}">Bestsellers</a></li>
                </ul>

                <form class="d-flex me-3" th:action="@{/search}" method="get">
                    <div class="input-group">
                        <input class="form-control bg-secondary text-white border-0" type="search" placeholder="Search books...">
                        <button class="btn btn-info" type="submit">🔍</button>
                    </div>
                </form>

                <div class="d-flex align-items-center gap-3">
                    <a th:href="@{/cart/view-cart}" class="btn btn-outline-light position-relative btn-sm">
                        🛒 Cart
                        <span th:text="${cartSize}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        	
                        </span>
                    </a>
                    <a th:href="@{/login}" class="text-white text-decoration-none small">Sign In</a>
                </div>
            </div>
        </div>
    </nav>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
