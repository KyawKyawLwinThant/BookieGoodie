<section th:fragment="hero">
    <style>
        /* ... your existing CSS variable and hero styles ... */
        .hero-wrapper {
            background: linear-gradient(135deg, #312e81 0%, #3730a3 100%);
            color: white;
            padding: 6rem 0; /* Increased padding */
            position: relative;
        }
        /* Fix for sticky-top interaction */
        .sticky-top + .hero-wrapper {
            margin-top: 0; 
        }
    </style>

    <div class="hero-wrapper">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <span class="badge bg-info text-dark mb-3 px-3 py-2 rounded-pill">New Season Arrivals</span>
                    <h1 class="hero-title" style="font-family: 'Playfair Display', serif; font-size: 3.5rem;">
                        Your Next Great Adventure <br> <span class="text-info">Starts Here.</span>
                    </h1>
                    <p class="hero-subtitle opacity-75 mb-4 fs-5">
                        Discover thousands of curated titles, from timeless classics to modern masterpieces.
                    </p>
                    <div class="d-flex gap-3">
                        <a th:href="@{/book/list-books}" class="btn btn-light rounded-pill px-4 py-2 fw-bold">Shop Now</a>
                        <a th:href="@{/about}" class="btn btn-outline-light rounded-pill px-4 py-2">Our Story</a>
                    </div>
                </div>

                <div class="col-lg-6 d-none d-lg-block text-center">
                    <div class="book-card-mockup shadow-lg p-3 bg-white rounded" style="transform: rotate(-3deg); max-width: 320px; margin-left: auto;">
                        <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=400" 
                             class="img-fluid rounded" alt="Featured">
                        <div class="mt-3 text-dark">
                            <strong class="d-block">The Indigo Chronicles</strong>
                            <span class="text-primary fw-bold">$24.99</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
